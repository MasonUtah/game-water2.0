<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Water Quest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container py-4 py-md-5">
    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 760px;">
      <div class="card-body p-4 p-md-5">
        <div class="d-flex justify-content-start justify-content-md-start mb-3">
          <img src="cw_horizontal_white.jpg" alt="charity: water logo" class="header-logo">
        </div>
        <h1 class="display-6 fw-bold text-center mb-3">Water Quest</h1>
        <p class="game-instructions text-center mb-4">Collect 20 items to complete the game!</p>

        <div class="stats d-flex flex-column flex-sm-row justify-content-center gap-3 mb-4">
          <p class="mb-0 px-3 py-2 rounded-3 text-center">Cans Collected: <span id="current-cans">0</span></p>
          <p class="mb-0 px-3 py-2 rounded-3 text-center">Time Left: <span id="timer">30</span>s</p>
        </div>

        <div class="d-flex flex-column flex-sm-row justify-content-center align-items-center gap-2 mb-3">
          <label for="difficulty" class="fw-semibold">Difficulty:</label>
          <select id="difficulty" class="form-select form-select-sm w-auto">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div id="achievements" class="achievement text-center fw-semibold mb-3"></div>
        <div class="game-grid mx-auto"></div>
        <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 mt-4">
          <button id="start-game" class="btn btn-success btn-lg px-4">Start Game</button>
          <button id="reset-game" class="btn btn-outline-primary btn-lg px-4" disabled>Reset Game</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
